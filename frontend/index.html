<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiletRez - Bilet Rezervasyon Platformu</title>
    <!-- CSS Variables for Muted Design (Synced with styles.css) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Kritik İşlevsel Stiller (styles.css yüklenmezse bile çalışır) */
        .search-form { display: none; }
        .search-form.active { display: block !important; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(93, 82, 99, 0.6); backdrop-filter: blur(5px); }
        .results-section { padding: 3rem 0; min-height: 400px; }
        #results { margin-top: 2rem; }
        .trip-main-content { padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        
        /* Seçim Alanı (Koltuk Seçimi & Form) */
        .selection-area { display: none; background: #fff; padding: 2rem; border-top: 1px solid rgba(155, 138, 165, 0.3); gap: 2rem; flex-wrap: wrap; width: 100%; }
        .selection-area.active { display: flex !important; animation: fadeIn 0.4s ease; }
        
        .itinerary-container { flex: 1.2; min-width: 200px; border-right: 1px dashed rgba(155, 138, 165, 0.3); padding-right: 1rem; }
        .map-part { flex: 2; min-width: 300px; display: flex; flex-direction: column; align-items: center; }
        .passenger-side { flex: 1.5; min-width: 300px; background: #FAF7FA; border-radius: 15px; padding: 1.5rem; }

        /* Itinerary Timeline */
        .itinerary-timeline { position: relative; padding-left: 20px; text-align: left; }
        .timeline-item { position: relative; margin-bottom: 25px; padding-left: 20px; border-left: 2px solid #B8A9C0; }
        .timeline-item::before { content: ''; position: absolute; left: -9px; top: 5px; width: 16px; height: 16px; border-radius: 50%; background: #9B8AA5; border: 3px solid #fff; }
        .timeline-time { display: block; font-weight: 700; font-size: 0.9rem; color: #7A6B82; }
        .timeline-station { font-size: 1rem; color: #4A3F4F; }
        .mola-label { color: #8FA68F; font-size: 0.8rem; font-weight: 700; margin-left: 10px; }

        /* Seat Grid Mapping */
        .bus-container, .plane-container { position: relative; background: #fff; padding: 3rem 1.5rem 1.5rem; border-radius: 40px 40px 15px 15px; border: 3px solid #eee; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .driver-seat { position: absolute; top: 15px; right: 25px; font-size: 1.8rem; opacity: 0.4; }
        .seat-grid { display: flex; flex-direction: column; gap: 10px; }
        .seat-row { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 5px; }
        .aisle-space { width: 40px; }
        
        .seat { width: 42px; height: 42px; border: 2px solid rgba(155, 138, 165, 0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; position: relative; background: #fff; transition: 0.3s; color: #7A6B82; }
        .seat.available:hover { background: #D4C9D9; border-color: #9B8AA5; transform: translateY(-3px); color: #4A3F4F; }
        .seat.occupied { background: #F0F0F0; cursor: not-allowed; opacity: 0.5; pointer-events: none; border-color: #ddd; color: #ccc; }
        .seat.occupied.female { background: #FCE4EC; border-color: #F06292; color: #AD1457; opacity: 1; pointer-events: none; }
        .seat.occupied.male { background: #E3F2FD; border-color: #64B5F6; color: #1976D2; opacity: 1; pointer-events: none; }
        .seat.selected-female { background: #F06292; border-color: #AD1457; color: #fff; box-shadow: 0 0 15px rgba(240, 98, 146, 0.6); }
        .seat.selected-male { background: #2196F3; border-color: #1976D2; color: #fff; box-shadow: 0 0 15px rgba(33, 150, 243, 0.6); }

        /* Gender Bubble */
        .gender-bubble { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 40px; display: flex; gap: 15px; padding: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 100; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border: 2px solid #9B8AA5; }
        .bubble-btn { border: none; background: #f5f5f5; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.4rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .bubble-btn:hover:not(:disabled) { transform: scale(1.15); }
        .bubble-btn.f:hover { background: #FCE4EC; color: #AD1457; }
        .bubble-btn.m:hover { background: #E3F2FD; color: #1976D2; }
        
        @keyframes bounceIn { from { transform: translateX(-50%) scale(0.3); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .confirm-btn { background: linear-gradient(135deg, #9B8AA5 0%, #5D5263 100%) !important; color: white !important; width: 100%; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(155, 138, 165, 0.3); font-size: 1rem; }
        .confirm-btn:active { transform: translateY(0); }

        /* Gender Modal Logic (Hidden by default, used only when needed) */
        .gender-modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .gender-content { background: white; padding: 2.5rem; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; }
        .gender-options { display: flex; gap: 1rem; margin-top: 2rem; }
        .gender-btn { flex: 1; padding: 1.2rem; border-radius: 8px; border: 2px solid #eee; cursor: pointer; transition: 0.3s; font-weight: 700; font-size: 1rem; }
        
        /* Payment Row Alignment */
        .form-row-payment { display: flex; gap: 10px; margin-top: 5px; }
        .form-row-payment .form-group { margin-bottom: 0; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <svg width="35" height="35" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18" fill="#9B8AA5"/>
                    <path d="M12 20L20 12L28 20L20 28L12 20Z" fill="white"/>
                </svg>
                <span>BiletRez</span>
            </div>
            <div class="nav-links">
                <a href="#" class="active">Ana Sayfa</a>
                <a href="#" onclick="showPage('search')">Bilet Ara</a>
                <a href="#" onclick="showPage('profile')">Profilim</a>
                <a href="#" onclick="showPage('login')" id="loginLink">Giriş</a>
                <a href="#" onclick="logout()" id="logoutLink" style="display:none;">Çıkış</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bilet Rezervasyon Platformu</h1>
            <p>Güvenli, hızlı ve kolay bilet alımı</p>
            <div class="search-tabs">
                <button class="tab-btn active" onclick="switchTab('bus')">Otobüs Bileti</button>
                <button class="tab-btn" onclick="switchTab('flight')">Uçak Bileti</button>
            </div>

            <!-- Bus Form -->
            <div id="busSearch" class="search-form active">
                <div class="form-row">
                    <div class="input-group"><label>Nereden</label><select id="busFrom"><option value="">Nereden Seçin</option></select></div>
                    <div class="swap-btn" onclick="swapLocations('bus')">⇄</div>
                    <div class="input-group"><label>Nereye</label><select id="busTo"><option value="">Nereye Seçin</option></select></div>
                    <div class="input-group"><label>Tarih</label><input type="date" id="busDate"></div>
                    <div class="input-group"><label>Yolcu</label>
                        <select id="busPassengers"><option value="1">1 Yolcu</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                    </div>
                    <button class="search-btn" onclick="searchBus()">Seferleri Ara</button>
                </div>
            </div>

            <!-- Flight Form -->
            <div id="flightSearch" class="search-form">
                <div class="form-row">
                    <div class="input-group"><label>Nereden</label><select id="flightFrom"><option value="">Havalimanı Seçin</option></select></div>
                    <div class="swap-btn" onclick="swapLocations('flight')">⇄</div>
                    <div class="input-group"><label>Nereye</label><select id="flightTo"><option value="">Havalimanı Seçin</option></select></div>
                    <div class="input-group"><label>Tarih</label><input type="date" id="flightDate"></div>
                    <div class="input-group"><label>Yolcu</label>
                        <select id="flightPassengers"><option value="1">1 Yolcu</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                    </div>
                    <button class="search-btn" onclick="searchFlight()">Uçuş Ara</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Results -->
    <section id="results" class="results-section" style="display:none;">
        <div class="container">
            <h2>Bulunan Seferler</h2>
            <div id="resultsList" class="results-list"></div>
        </div>
    </section>

    <!-- Profile -->
    <section id="profileSection" class="results-section" style="display:none;"></section>

    <!-- Modals (Reconstructed) -->
    <div id="paymentModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close" onclick="closeModal('paymentModal')">&times;</span>
            <h2>Güvenli Ödeme</h2>
            <div id="paymentDetails" class="payment-summary"></div>
            <form id="paymentForm">
                <div class="form-group"><label>Kart Sahibi</label><input type="text" id="cardHolder" required></div>
                <div class="form-group"><label>Kart Numarası</label><input type="tel" id="cardNumber" maxlength="19" required></div>
                <div class="form-row-payment" style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;"><label>Son Kul.</label><input type="text" id="cardExpiry" maxlength="5" required></div>
                    <div class="form-group" style="flex:1;"><label>CVV</label><input type="tel" id="cardCVV" maxlength="3" required></div>
                </div>
                <button type="button" class="confirm-btn" id="payBtn" onclick="processPayment()">
                    <span id="payBtnText">ÖDEMEYİ TAMAMLA</span>
                    <span id="paySpinner" class="spinner" style="display: none; width: 18px; height: 18px;"></span>
                </button>
            </form>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Giriş</h2>
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                <div class="form-group"><label>Şifre</label><input type="password" id="loginPassword" required></div>
                <button type="button" class="confirm-btn" onclick="login()">Giriş Yap</button>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>Kayıt Ol</h2>
            <form id="registerForm">
                <div class="form-group"><label>Ad Soyad</label><input type="text" id="regName" required></div>
                <div class="form-group"><label>E-posta</label><input type="email" id="regEmail" required></div>
                <div class="form-group"><label>Şifre</label><input type="password" id="regPassword" required></div>
                <button type="button" class="confirm-btn" onclick="register()">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
