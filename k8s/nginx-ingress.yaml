apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bilet-ingress
  namespace: bilet-system
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: bilet-rez.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-service # Default to one of the services or a dedicated frontend service
            port:
              number: 8000
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      - path: /api/user
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8000
      - path: /api/trip
        pathType: Prefix
        backend:
          service:
            name: trip-service
            port:
              number: 8000
      - path: /api/flight
        pathType: Prefix
        backend:
          service:
            name: flight-service
            port:
              number: 8000
      - path: /api/booking
        pathType: Prefix
        backend:
          service:
            name: booking-service
            port:
              number: 8000
      - path: /api/payment
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 8000
